<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ page_title | default("Smart Focus") }}{% endblock %} · Smart Focus</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="layout">
    <header class="header">
      <a href="{{ url_for('index') }}" class="logo">Smart <span>Focus</span></a>
      <div class="header-right">
        <div class="user-menu" id="user-menu">
          <button type="button" class="user-display" id="user-menu-toggle" aria-expanded="false">
            {{ session.get('user_id', '사용자') }}
          </button>
          <div class="user-dropdown" id="user-dropdown">
            <a href="{{ url_for('camera') }}">카메라 연결</a>
            <a href="{{ url_for('logout') }}">로그아웃</a>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      Smart Focus Management System
    </footer>
  </div>

  <script>
    (function () {
      const menu = document.getElementById("user-menu");
      const toggle = document.getElementById("user-menu-toggle");
      const dropdown = document.getElementById("user-dropdown");
      if (!menu || !toggle || !dropdown) return;

      toggle.addEventListener("click", function () {
        const isOpen = menu.classList.toggle("open");
        toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });

      document.addEventListener("click", function (event) {
        if (!menu.contains(event.target)) {
          menu.classList.remove("open");
          toggle.setAttribute("aria-expanded", "false");
        }
      });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
